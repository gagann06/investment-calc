<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator | XYZ Capital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background-color: #0A1628;
            color: #F0F0F0;
            min-height: 100vh;
        }

        nav {
            background-color: #0D1F3C;
            border-bottom: 2px solid #C9A84C;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo { font-size: 1.4rem; font-weight: bold; color: #C9A84C; letter-spacing: 2px; }
        nav a { color: #F0F0F0; text-decoration: none; margin-left: 30px; font-size: 0.95rem; letter-spacing: 1px; }
        nav a:hover { color: #C9A84C; }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h2 {
            color: #C9A84C;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #B0B8C8;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .error {
            background-color: #3C1A1A;
            border-left: 4px solid #E05555;
            color: #F0A0A0;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #C9A84C;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background-color: #0D1F3C;
            border: 1px solid #1E3A5F;
            border-bottom: 2px solid #C9A84C;
            color: #F0F0F0;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-bottom-color: #E0C068; }

        .divider {
            border: none;
            border-top: 1px solid #1E3A5F;
            margin: 30px 0;
        }

        .btn {
            width: 100%;
            background-color: #C9A84C;
            color: #0A1628;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'Georgia', serif;
        }

        .btn:hover { background-color: #E0C068; }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #1E3A5F;
            color: #5A6A80;
            font-size: 0.85rem;
            margin-top: 60px;
        }

        .spinner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(10, 22, 40, 0.85);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1E3A5F;
            border-top: 4px solid #C9A84C;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .spinner-text {
            color: #C9A84C;
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">XYZ CAPITAL</div>
        <div>
            <a href="/">Home</a>
            <a href="/calculator">Calculator</a>
        </div>
    </nav>

    <div class="container">
        <h2>INVESTMENT CALCULATOR</h2>
        <p class="subtitle">Enter your investment parameters below.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/calculate" method="POST">
            <div class="form-group">
                <label>STOCK TICKER</label>
                <input type="text" name="ticker" placeholder="e.g. AAPL" required>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label>START DATE</label>
                <input type="date" name="start_date" required>
            </div>

            <div class="form-group">
                <label>END DATE</label>
                <input type="date" name="end_date" required>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label>INITIAL INVESTMENT (£)</label>
                <input type="number" name="initial_investment" placeholder="e.g. 1000" min="0.01" step="0.01" required>
            </div>

            <div class="form-group">
                <label>MONTHLY CONTRIBUTION (£) — OPTIONAL</label>
                <input type="number" name="monthly_contribution" placeholder="e.g. 100 (enter 0 if none)" min="0" step="0.01" value="0">
            </div>

            <button type="submit" class="btn">CALCULATE RETURNS</button>
        </form>
    </div>

    <footer>&copy; 2026 XYZ Capital. For educational purposes only.</footer>

<script>
    document.querySelector('form').addEventListener('submit', function() {
        document.getElementById('spinnerOverlay').style.display = 'flex';
    });
</script>

</body>

<div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <div class="spinner-text">FETCHING DATA...</div>
</div>

</html>
